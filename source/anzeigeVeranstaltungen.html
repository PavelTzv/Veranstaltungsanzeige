<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <meta 
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <title>Vernanstaltungen Heute</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <h1 id="Uhrzeit" class="zeit">Zeit</h1>
    
    <h1 id="datum" class="date">Heute</h1>  
    <img src="logo.png" alt="C-DAT Logo" class="logo">
  </div>
  <main class="display-content">
    <div id="table-container"></div>
    <section id="no-events-view" class="no-events-view" aria-live="polite">
      <img src="icon.png" alt="C-DAT Icon" class="no-events-view__icon">
      <p id="no-events-message" class="no-events-view__message">Heute finden keine Veranstaltungen statt.</p>
    </section>
  </main>
</body>
<script src="./renderer.js"></script>
</html>
